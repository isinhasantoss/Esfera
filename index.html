<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bieber Space Experience</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; display: flex; justify-content: center;
            align-items: center; flex-direction: column;
            background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
            font-family: sans-serif;
        }

        /* Botão para liberar o áudio */
        #btn-start {
            padding: 15px 30px;
            font-size: 18px;
            background: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        #btn-start:hover { transform: scale(1.1); background: #00e5ff; }

        .esfera {
            width: 250px; height: 250px; border-radius: 50%;
            cursor: pointer; display: none; /* Escondida até clicar no start */
            background: radial-gradient(circle at 75px 75px, #4facfe, #000);
            box-shadow: inset -25px -25px 60px rgba(0,0,0,0.8), 0 0 50px rgba(79, 172, 254, 0.4);
            transition: all 0.5s ease;
            animation: flutuar 4s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <button id="btn-start">🚀 CLIQUE PARA INICIAR A GALÁXIA</button>
    <div class="esfera" id="esfera"></div>

    <script>
        const btn = document.getElementById('btn-start');
        const esfera = document.getElementById('esfera');
        const player = new Audio();

        // Lista de links (substitua pelos seus se estes pararem de funcionar)
        const musicas = [
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        ];

        // 1. O usuário clica no botão, o navegador libera o áudio
        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            esfera.style.display = 'block';
            // Toca um silêncio só para "acordar" o áudio no navegador
            player.play().catch(() => {}); 
        });

        // 2. Lógica da esfera
        esfera.addEventListener('mouseenter', () => {
            // Cor Aleatória
            const cor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            esfera.style.background = `radial-gradient(circle at 75px 75px, ${cor}, #000)`;
            esfera.style.boxShadow = `inset -25px -25px 60px rgba(0,0,0,0.8), 0 0 80px ${cor}`;

            // Música Aleatória
            const link = musicas[Math.floor(Math.random() * musicas.length)];
            player.src = link;
            player.play();
        });
    </script>
</body>
</html>
